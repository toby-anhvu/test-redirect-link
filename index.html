<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mở EPIISOD</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f4f2f0;
      }
      .btn {
        display: inline-block;
        padding: 14px 28px;
        background: #000;
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-size: 16px;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <p>Đang mở EPIISOD…</p>
    <a class="btn" id="openBtn" href="#">Mở app thủ công</a>

    <script>
      // ====== CHỈNH THEO MÔI TRƯỜNG TEST ======
      // App đang cài (com.epiisod.mobile) đăng ký cả 2 scheme: centurion-dev và epiisod.
      // Bản phát hành thật (PROD) dùng scheme "epiisod".
      var APP_SCHEME = "centurion-dev://home";
      var ANDROID_PACKAGE = "com.epiisod.mobile";
      var IOS_APP_ID = "6757422745";

      // Scheme native mở thẳng app store (không qua trình duyệt)
      var ANDROID_STORE_NATIVE = "market://details?id=" + ANDROID_PACKAGE;
      var IOS_STORE_NATIVE = "itms-apps://itunes.apple.com/app/id" + IOS_APP_ID;
      // Link https dự phòng khi máy không có app store (vd thiết bị không có Play Store)
      var ANDROID_STORE_WEB =
        "https://play.google.com/store/apps/details?id=" + ANDROID_PACKAGE;
      var IOS_STORE_WEB =
        "https://apps.apple.com/us/app/epiisod-living/id" + IOS_APP_ID;
      // ========================================

      var ua = navigator.userAgent || navigator.vendor || "";
      var isAndroid = /android/i.test(ua);
      var isIOS = /iphone|ipad|ipod/i.test(ua);

      document.getElementById("openBtn").href = APP_SCHEME;

      function goToStore() {
        if (isAndroid) {
          // mở thẳng app Cửa hàng Play
          window.location.href = ANDROID_STORE_NATIVE;
          // nếu không có Play Store -> rớt về web
          setTimeout(function () {
            window.location.href = ANDROID_STORE_WEB;
          }, 800);
        } else if (isIOS) {
          window.location.href = IOS_STORE_NATIVE;
          setTimeout(function () {
            window.location.href = IOS_STORE_WEB;
          }, 800);
        }
      }

      function tryOpenApp() {
        var start = Date.now();
        // thử mở app
        window.location = APP_SCHEME;

        // app chưa cài -> sau 1.5s vẫn ở lại trang -> sang store
        setTimeout(function () {
          if (Date.now() - start < 2000) {
            goToStore();
          }
        }, 1500);
      }

      tryOpenApp();
    </script>
  </body>
</html>
